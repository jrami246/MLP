    .main-title {
  text-align: center;
  font-size: 45px;
  font-weight: bold;
  margin-bottom: 25px;

  color: #eb0000;  
}

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      column-gap: 10px;
      row-gap: 30px;

      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .checked {
      opacity: 0.5;
      text-decoration: line-through;
    }

let checked = JSON.parse(localStorage.getItem("cards")) || {};

function render() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  for (const rarity in categories) {
    const title = document.createElement("h2");
    title.textContent = rarity;

    title.style.gridColumn = "1 / -1";
    title.style.display = "block";
    title.style.paddingTop = "30px";
    title.style.paddingBottom = "10px";
    title.style.color = "#eb0000";

    if (rarity === "R" || rarity === "HR") {
      title.style.fontSize = "36px";
      title.style.fontWeight = "bold";
    }

    container.appendChild(title);

    categories[rarity].forEach(card => {
      if (!card.name) return;

      const cardId = rarity + "-" + card.name;

      const div = document.createElement("div");
      div.className = "card " + (checked[cardId] ? "checked" : "");

      div.innerHTML = `
        <img src="${card.image}">
        <p>${card.name}</p>
      `;

      div.onclick = () => {
        checked[cardId] = !checked[cardId];
        localStorage.setItem("cards", JSON.stringify(checked));
        render();
      };

      container.appendChild(div);
    });
  }
}
